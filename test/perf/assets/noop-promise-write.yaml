apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: perftest
spec:
  destinationSelectors:
    - matchLabels:
        environment: dev
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: perftests.perf.kratix.io
    spec:
      group: perf.kratix.io
      names:
        kind: PerfTest
        plural: perftests
        singular: perftest
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    replicas:
                      type: integer
                      default: 1
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: write
          spec:
            jobOptions:
              ttlSecondsAfterFinished: 10
            containers:
              - name: write
                image: busybox:1.36
                command:
                  - sh
                  - -c
                  - |
                    NAME=$(grep '^  name:' /kratix/input/object.yaml | head -1 | awk '{print $2}')
                    cat > /kratix/output/configmap.yaml <<YAML
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: ${NAME}
                      namespace: default
                    data:
                      test: "true"
                    YAML
