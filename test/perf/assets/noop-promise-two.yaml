apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: perftest-two
spec:
  destinationSelectors:
    - matchLabels:
        environment: dev
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: perftesttwos.perf.kratix.io
    spec:
      group: perf.kratix.io
      names:
        kind: PerfTestTwo
        plural: perftesttwos
        singular: perftesttwo
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    replicas:
                      type: integer
                      default: 1
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: noop
          spec:
            containers:
              - name: noop
                image: busybox:1.36
                command: ["sh", "-c", "exit 0"]
