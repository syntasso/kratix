apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: gitrecovery
spec:
  destinationSelectors:
    - matchLabels:
        target: git-recovery
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: gitrecoveries.test.kratix.io
    spec:
      group: test.kratix.io
      names:
        kind: GitRecovery
        plural: gitrecoveries
        singular: gitrecovery
      scope: Namespaced
      versions:
        - name: v1alpha1
          schema:
            openAPIV3Schema:
              properties:
                spec:
                  properties:
                    value:
                      type: string
                  type: object
              type: object
          served: true
          storage: true
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: resource
          spec:
            containers:
              - name: do-commands
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["sh"]
                args:
                  - -c
                  - |
                    set -eux
                    value=$(yq '.spec.value' /kratix/input/object.yaml)
                    kubectl create configmap gitrecovery-cm --namespace=git-recovery --dry-run=client --output=yaml --from-literal=value=${value} > /kratix/output/gitrecovery-configmap.yaml
