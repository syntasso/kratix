apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: rbversion
  labels:
    kratix.io/promise-version: v1.0.0
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: rbversions.test.kratix.io
    spec:
      group: test.kratix.io
      names:
        kind: Rbversion
        plural: rbversions
        singular: rbversion
      scope: Namespaced
      versions:
        - name: v1alpha1
          schema:
            openAPIV3Schema:
              type: object
          served: true
          storage: true
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: resource-configure
          spec:
            containers:
              - image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                name: no-op
                command:
                  - /bin/sh
                args:
                  - -c
                  - "echo done"
