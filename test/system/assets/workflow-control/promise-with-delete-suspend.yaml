apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: promise-with-delete-suspend
  labels:
    kratix.io/promise-version: v1
spec:
  workflows:
    promise:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-0
          spec:
            containers:
              - name: complete
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    echo "pipe-0 complete"
      delete:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: delete-pipe
          spec:
            rbac:
              permissions:
                - apiGroups: [""]
                  resources: ["configmaps"]
                  verbs: ["get"]
            containers:
              - name: suspend-if-configmap-exists
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    if kubectl get configmap promise-delete-suspend-gate -n kratix-platform-system >/dev/null 2>&1; then
                      echo "configmap exists; suspending delete"
                      cat <<'EOF' > /kratix/metadata/workflow-control.yaml
                    suspend: true
                    message: waiting for promise delete approval
                    EOF
                    else
                      echo "configmap not found; delete can proceed"
                    fi
