apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: workflow-suspend
  labels:
    kratix.io/promise-version: suspend-v2
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: workflowsuspends.test.kratix.io
    spec:
      group: test.kratix.io
      names:
        kind: WorkflowSuspend
        plural: workflowsuspends
        singular: workflowsuspend
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    data:
                      type: string
  workflows:
    promise:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-0
          spec:
            containers:
              - name: complete
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    echo "pipe-0 complete from v2"
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-1
          spec:
            containers:
              - name: no-suspend
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    echo "pipe-1 complete without suspension"
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-2
          spec:
            containers:
              - name: complete
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    echo "pipe-2 complete from v2"
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: resource-pipe-0
          spec:
            rbac:
              permissions:
                - apiGroups: [""]
                  resources: ["configmaps"]
                  verbs: ["get"]
            containers:
              - name: suspend-unless-configmap-exists
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    cat <<'EOF' > /kratix/output/resource-configmap.yaml
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: workflow-suspend-generated
                      namespace: default
                    data:
                      source: suspended-resource-pipeline
                    EOF
                    if kubectl get configmap workflow-suspend-test -n default >/dev/null 2>&1; then
                      echo "configmap exists; not suspending"
                      exit 0
                    fi
                    cat <<'EOF' > /kratix/metadata/workflow-control.yaml
                    suspend: true
                    message: waiting for configmap
                    EOF
