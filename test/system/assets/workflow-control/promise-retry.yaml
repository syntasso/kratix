apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: workflow-retry
  labels:
    kratix.io/promise-version: retry-v1
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: workflowretries.test.kratix.io
    spec:
      group: test.kratix.io
      names:
        kind: WorkflowRetry
        plural: workflowretries
        singular: workflowretry
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
  workflows:
    promise:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-0
          spec:
            containers:
              - name: complete
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    echo "pipe-0 complete"
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-retry
          spec:
            rbac:
              permissions:
                - apiGroups: [ "" ]
                  resources: [ "configmaps" ]
                  verbs: [ "get" ]
            containers:
              - name: retry
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    if kubectl get configmap workflow-retry-test -n kratix-platform-system >/dev/null 2>&1; then
                      echo "configmap exists; not retrying for another time"
                      exit 0
                    fi
                    cat <<'EOF' > /kratix/metadata/workflow-control.yaml
                    retryAfter: 20s
                    message: configmap workflow-retry-test not found
                    EOF
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-2
          spec:
            containers:
              - name: complete
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    echo "pipe-2 complete"
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: resource-pipe-retry
          spec:
            containers:
              - name: retry
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    cat <<'EOF' > /kratix/metadata/workflow-control.yaml
                    retryAfter: 20s
                    message: retrying resource pipeline
                    EOF
