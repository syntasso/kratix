apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: promise-with-delete-retry
  labels:
    kratix.io/promise-version: v1
spec:
  workflows:
    promise:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: pipe-0
          spec:
            containers:
              - name: complete
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    echo "pipe-0 complete"
      delete:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: delete-retry-pipe
          spec:
            rbac:
              permissions:
                - apiGroups: [""]
                  resources: ["configmaps"]
                  verbs: ["get"]
            containers:
              - name: retry-until-configmap-exists
                image: ghcr.io/syntasso/kratix-pipeline-utility:v0.0.1
                command: ["/bin/sh", "-c"]
                args:
                  - |
                    set -eu
                    if kubectl get configmap promise-delete-retry-gate -n kratix-platform-system >/dev/null 2>&1; then
                      echo "configmap exists; delete can proceed"
                      exit 0
                    fi
                    cat <<'EOF' > /kratix/metadata/workflow-control.yaml
                    retryAfter: 20s
                    message: waiting for gate configmap
                    EOF
