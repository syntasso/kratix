apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: upgrade
  labels:
    kratix.io/promise-version: v0.3.0-FAILING
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: upgrades.test.kratix.io
    spec:
      group: test.kratix.io
      names:
        kind: Upgrade
        plural: upgrades
        singular: upgrade
      scope: Namespaced
      versions:
        - name: v1alpha1
          schema:
            openAPIV3Schema:
              properties:
                spec:
                  properties:
                    configMapName:
                      type: string
                  type: object
              type: object
          served: true
          storage: true
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: resource-configure
          spec:
            jobOptions:
              backoffLimit: 0
            containers:
              - image: alpine:3
                name: fail
                command:
                  - /bin/sh
                  - -c
                  - exit 1
