version: 2
updates:
  # Version updates disabled — security-only to reduce noise while dependency baseline is stabilised.
  # open-pull-requests-limit: 0 suppresses routine version bumps; Dependabot security alerts
  # bypass this limit and still open individual PRs for CVEs.
  # Re-enable by removing open-pull-requests-limit once baseline is healthy.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    groups:
      go-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: gomod
    directory: /hack/kratix-quick-start-installer
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    groups:
      go-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: gomod
    directory: /test/system/assets/promise-release/test-server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 0
    groups:
      go-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
