apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  name: appa
spec:
  destinationSelectors:
    - matchLabels:
        environment: dev
  dependencies:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: appa-dependency
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: appas.example.kratix.io
    spec:
      group: example.kratix.io
      names:
        kind: Appa
        plural: appas
        singular: appa
      scope: Namespaced
      versions:
        - name: v1alpha1
          served: true
          storage: true
          schema:
            openAPIV3Schema:
              type: object
              properties:
                spec:
                  type: object
                  properties:
                    message:
                      type: string
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: appa-configure
          spec:
            containers:
              - name: configure
                image: busybox:1.36
                command: ["sh", "-c"]
                args:
                  - |
                    cat <<'EOF' > /kratix/output/configmap.yaml
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: appa-config
                      namespace: default
                    data:
                      message: "hello from the appa resource pipeline"
                    EOF
                securityContext:
                  runAsUser: 1000
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
                  seccompProfile:
                    type: RuntimeDefault
