apiVersion: v1
kind: ConfigMap
metadata:
  name: kratix
  namespace: kratix-platform-system
data:
  config: |
    workflows:
      jobOptions:
        defaultBackoffLimit: 4
      defaultContainerSecurityContext:
        windowsOptions:
          runAsUserName: "setInKratixConfig"
    telemetry:
      traces:
        enabled: true
      metrics:
        enabled: true
      endpoint: grafana-k8s-monitoring-alloy-receiver.default.svc.cluster.local:4317
      protocol: grpc
      insecure: true
    logging:
      structured: true
      level: info
    git:
      # minimumFetchInterval controls how often Kratix fetches the latest remote
      # Git state before resetting a cached GitStateStore clone. Defaults to 5s.
      # Set to 0s to fetch before every write. Changes are loaded at controller
      # startup, so restart the Kratix controller pod after changing this value.
      minimumFetchInterval: 5s
