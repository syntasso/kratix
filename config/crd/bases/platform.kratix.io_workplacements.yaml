---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: workplacements.platform.kratix.io
spec:
  group: platform.kratix.io
  names:
    categories:
    - kratix
    kind: WorkPlacement
    listKind: WorkPlacementList
    plural: workplacements
    shortNames:
    - wp
    - wps
    singular: workplacement
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Destination this Workplacement is scheduled to.
      jsonPath: .spec.targetDestinationName
      name: DESTINATION
      type: string
    - description: Status of this Workplacement
      jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: STATUS
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: WorkPlacement is the Schema for the workplacements API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkPlacementSpec defines the desired state of WorkPlacement
            properties:
              generation:
                description: Generation of the parent Work
                format: int64
                type: integer
              id:
                description: Unique identifier for the workload group this WorkPlacement
                  represents
                type: string
              promiseName:
                description: Name of the Promise that generated the parent Work
                type: string
              resourceName:
                description: Name of the Resource Request that generated the parent
                  Work. Empty for Promise-level dependencies
                type: string
              targetDestinationName:
                description: Name of the Destination this WorkPlacement is assigned
                  to
                type: string
              workloads:
                description: List of workloads to be written to the target Destination's
                  StateStore
                items:
                  description: Workload represents a single manifest file to be written
                    to a Destination StateStore
                  properties:
                    content:
                      description: Content of the workload manifest, base64 encoded
                        and gzip compressed
                      type: string
                    filepath:
                      description: Path of the file relative to the workload group
                        directory
                      type: string
                  type: object
                type: array
            type: object
          status:
            description: WorkPlacementStatus defines the observed state of WorkPlacement
            properties:
              conditions:
                description: Current conditions of the WorkPlacement. Includes a Ready
                  condition indicating all workloads are written to the StateStore
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              versionID:
                description: |-
                  VersionID contains the version identifier of the last applied workplacement
                  For Git StateStores, this is the SHA of the last applied commit
                  For Bucket StateStores, this is always empty
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
