# permissions for end users to view dryruns.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dryrun-viewer-role
rules:
- apiGroups:
  - platform.kratix.io
  resources:
  - dryruns
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - platform.kratix.io
  resources:
  - dryruns/status
  verbs:
  - get
