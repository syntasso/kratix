# permissions for end users to edit dryruns.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dryrun-editor-role
rules:
- apiGroups:
  - platform.kratix.io
  resources:
  - dryruns
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - platform.kratix.io
  resources:
  - dryruns/status
  verbs:
  - get
