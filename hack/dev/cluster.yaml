apiVersion: ctlptl.dev/v1alpha1
kind: Registry
name: kratix-registry
port: 5000
---
apiVersion: ctlptl.dev/v1alpha1
kind: Cluster
name: kind-platform
product: kind
registry: kratix-registry
kindV1Alpha4Cluster:
  kind: Cluster
  apiVersion: kind.x-k8s.io/v1alpha4
  nodes:
    - role: control-plane
      image: kindest/node:v1.33.1
      extraPortMappings:
        - containerPort: 31337
          hostPort: 31337
        - containerPort: 31340
          hostPort: 31340
        - containerPort: 31333
          hostPort: 31333
        # ArgoCD UI (NodePort set by hack/dev/expose-argocd.sh) -> https://localhost:31380
        - containerPort: 31380
          hostPort: 31380
