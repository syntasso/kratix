---
apiVersion: v1
kind: Secret
metadata:
  name: gitea
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://172.18.0.2:31333/gitea_admin/kratix
  password: PASSWORD
  username: gitea_admin
  insecure: "true"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratix-workload-dependencies
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://172.18.0.2:31333/gitea_admin/kratix
    targetRevision: HEAD
    path: "worker-1/dependencies/"
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc # in-cluster reconcile
    namespace: default # The namespace will only be set for namespace-scoped resources without a value for .metadata.namespace
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      # keep retrying so the resources app recovers once the dependencies app
      # has applied the CRD it depends on (Argo does not order across Apps)
      limit: 20
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "2m"
    syncOptions:
      # server-side apply: Kratix Promise CRDs are large and exceed the
      # client-side last-applied-configuration annotation size limit
      - ServerSideApply=true
      # let a sync proceed before the CRD exists in the API yet
      - SkipDryRunOnMissingResource=true
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratix-workload-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://172.18.0.2:31333/gitea_admin/kratix
    targetRevision: HEAD
    path: "worker-1/resources/"
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc # in-cluster reconcile
    namespace: default # The namespace will only be set for namespace-scoped resources without a value for .metadata.namespace
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      # keep retrying so the resources app recovers once the dependencies app
      # has applied the CRD it depends on (Argo does not order across Apps)
      limit: 20
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "2m"
    syncOptions:
      # server-side apply: Kratix Promise CRDs are large and exceed the
      # client-side last-applied-configuration annotation size limit
      - ServerSideApply=true
      # let a sync proceed before the CRD exists in the API yet
      - SkipDryRunOnMissingResource=true
      - CreateNamespace=true
